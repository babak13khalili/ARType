<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AR Tag</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap");

      :root {
        --ui-font: "Roboto", sans-serif;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: var(--ui-font);
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #main-panel {
        position: fixed;
        left: 50%;
        bottom: max(24px, env(safe-area-inset-bottom, 0px) + 16px);
        transform: translateX(-50%);
        width: min(85%, 380px);
        padding: 8px 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        border-radius: 40px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.2);
        box-sizing: border-box;
      }

      #input-wrapper {
        flex-grow: 1;
        padding: 0 8px;
      }

      #user-text {
        background: transparent;
        border: none;
        color: #fff;
        font-size: 16px; /* prevents mobile browser zoom on focus */
        width: 100%;
        outline: none;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        font-family: var(--ui-font);
        font-weight: 400;
        line-height: 1.2;
        appearance: none;
        -webkit-appearance: none;
      }

      #user-text::placeholder {
        color: rgba(255, 255, 255, 0.72);
      }

      #submit-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .arrow-svg {
        stroke: #fff;
        stroke-width: 2;
        fill: none;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>

  <body>
    <!-- UI PANEL -->
    <div id="main-panel">
      <div id="input-wrapper">
        <input
          type="text"
          id="user-text"
          placeholder="LEAVE A TAG..."
          maxlength="50"
          autocapitalize="characters"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false" />
      </div>

      <button id="submit-btn" type="button" aria-label="Submit tag">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path class="arrow-svg" d="M12 19V5M5 12l7-7 7 7" />
        </svg>
      </button>
    </div>

    <!-- AR SCENE -->
    <a-scene
      mindar-image="imageTargetSrc: ./Targets/targets.mind; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 500; warmupTolerance: 1;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; precision: highp; colorManagement: true;">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity
        id="target-anchor"
        mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        query,
        limitToLast,
        orderByChild,
        onChildAdded,
        onChildRemoved,
        remove,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC-3C2JeR33zqqUxSkGrZoMckqXezJgRcY",
        authDomain: "b13artag26v01.firebaseapp.com",
        databaseURL:
          "https://b13artag26v01-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "b13artag26v01",
        storageBucket: "b13artag26v01.firebasestorage.app",
        messagingSenderId: "244929806839",
        appId: "1:244929806839:web:e0352f4d0717ca73b26ef2",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const dbRef = ref(db, "ar_tags");

      // -----------------------------
      // CONFIG
      // -----------------------------
      const MAX_TAGS = 50;
      const MIN_TAG_SCALE = 0.6;
      const MAX_TAG_SCALE = 1.0;
      const GLOBAL_TAG_SCALE = 0.5;

      const TAG_LIFETIME_MS = 30 * 24 * 60 * 60 * 1000; // 30 days
      const AGE_BUCKETS = 6;
      const AGE_BUCKET_MS = TAG_LIFETIME_MS / AGE_BUCKETS;

      // Smaller texture + smaller card than before
      const TEXTURE_FONT_SIZE = 76;
      const TEXTURE_PAD_X = 44;
      const TEXTURE_PAD_Y = 22;
      const CARD_HEIGHT = 0.095;

      const TAG_FONT_FAMILY = '"Roboto", Arial, sans-serif';
      const TAG_FONT_WEIGHT = "700";

      const HIGH_CONTRAST_PAIRS = [
        { text: "#FFFFFF", bg: "#FF004D" },
        { text: "#FFFFFF", bg: "#2962FF" },
        { text: "#000000", bg: "#FFEA00" },
        { text: "#000000", bg: "#00E5FF" },
        { text: "#000000", bg: "#76FF03" },
        { text: "#FFFFFF", bg: "#D500F9" },
        { text: "#FFFFFF", bg: "#FF3D00" },
        { text: "#000000", bg: "#00FFC8" },
        { text: "#FFFFFF", bg: "#000000" },
        { text: "#000000", bg: "#FFFFFF" },
        { text: "#FF1744", bg: "#FFFFFF" },
        { text: "#00B0FF", bg: "#000000" },
      ];

      // Explicit timestamp ordering
      const tagsQuery = query(
        dbRef,
        orderByChild("createdAt"),
        limitToLast(MAX_TAGS),
      );

      const input = document.getElementById("user-text");
      const submitBtn = document.getElementById("submit-btn");
      const anchor = document.getElementById("target-anchor");

      const renderedTags = new Map(); // key -> { entity, cardEl, data, createdAt, ageBucket }
      const textureCache = new Map(); // cache by text|textColor|bgColor|ageBucket

      let colorBag = [];
      let isSending = false;

      // -----------------------------
      // HELPERS
      // -----------------------------
      const refillColorBag = () => {
        colorBag = [...HIGH_CONTRAST_PAIRS];
        for (let i = colorBag.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [colorBag[i], colorBag[j]] = [colorBag[j], colorBag[i]];
        }
      };

      const getRandomColorPair = () => {
        if (!colorBag.length) refillColorBag();
        const pair = colorBag.pop();
        return { textColor: pair.text, bgColor: pair.bg };
      };

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const getAgeMs = (createdAt) => {
        if (typeof createdAt !== "number" || Number.isNaN(createdAt)) return 0;
        return Math.max(0, Date.now() - createdAt);
      };

      const getAgeBucket = (createdAt) => {
        const ageMs = getAgeMs(createdAt);
        if (ageMs >= TAG_LIFETIME_MS) return AGE_BUCKETS - 1;
        return clamp(Math.floor(ageMs / AGE_BUCKET_MS), 0, AGE_BUCKETS - 1);
      };

      const isExpired = (createdAt) => getAgeMs(createdAt) >= TAG_LIFETIME_MS;

      const escapeCachePart = (value) =>
        String(value ?? "").replace(/\|/g, "_");

      const getTextureCacheKey = (text, textColor, bgColor, ageBucket) =>
        [
          escapeCachePart(text),
          escapeCachePart(textColor),
          escapeCachePart(bgColor),
          ageBucket,
        ].join("|");

      const getBucketWearFactor = (ageBucket) => {
        if (AGE_BUCKETS <= 1) return 0;
        return ageBucket / (AGE_BUCKETS - 1);
      };

      const fontReady = async () => {
        if (document.fonts && document.fonts.ready) {
          try {
            await document.fonts.ready;
          } catch (err) {
            console.warn("Font readiness wait failed:", err);
          }
        }
      };

      // -----------------------------
      // TEXTURE GENERATION + CACHE
      // -----------------------------
      const makeTagTexture = (text, textColor, bgColor, ageBucket = 0) => {
        const content = text || " ";
        const cacheKey = getTextureCacheKey(
          content,
          textColor,
          bgColor,
          ageBucket,
        );

        if (textureCache.has(cacheKey)) {
          return textureCache.get(cacheKey);
        }

        const wearFactor = getBucketWearFactor(ageBucket);

        const measureCanvas = document.createElement("canvas");
        const measureCtx = measureCanvas.getContext("2d");
        if (!measureCtx) return null;

        measureCtx.font = `${TAG_FONT_WEIGHT} ${TEXTURE_FONT_SIZE}px ${TAG_FONT_FAMILY}`;
        const textWidth = Math.ceil(measureCtx.measureText(content).width);

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(220, textWidth + TEXTURE_PAD_X * 2);
        canvas.height = TEXTURE_FONT_SIZE + TEXTURE_PAD_Y * 2;

        const ctx = canvas.getContext("2d");
        if (!ctx) return null;

        // Base
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Text
        ctx.fillStyle = textColor;
        ctx.font = `${TAG_FONT_WEIGHT} ${TEXTURE_FONT_SIZE}px ${TAG_FONT_FAMILY}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(content, canvas.width / 2, canvas.height / 2);

        // Wear / aging by 6 monthly stages
        const noiseCount = Math.floor(80 + wearFactor * 260);
        for (let i = 0; i < noiseCount; i += 1) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const w = 1 + Math.random() * 2.2;
          const h = 1 + Math.random() * 2.2;
          const alpha = 0.008 + wearFactor * 0.035;

          ctx.fillStyle =
            i % 2 === 0
              ? `rgba(255,255,255,${alpha})`
              : `rgba(0,0,0,${alpha * 0.85})`;

          ctx.fillRect(x, y, w, h);
        }

        const scratchCount = Math.floor(wearFactor * 8);
        for (let i = 0; i < scratchCount; i += 1) {
          const y = Math.random() * canvas.height;
          const thickness = 1 + Math.random() * 1.5;
          const alpha = 0.025 + wearFactor * 0.06;
          ctx.fillStyle = `rgba(0,0,0,${alpha})`;
          ctx.fillRect(0, y, canvas.width, thickness);
        }

        const edgeCuts = Math.floor(wearFactor * 18);
        for (let i = 0; i < edgeCuts; i += 1) {
          const side = Math.floor(Math.random() * 4);
          const depth = 8 + Math.random() * (14 + wearFactor * 20);
          const span = 12 + Math.random() * (18 + wearFactor * 24);

          ctx.beginPath();
          ctx.fillStyle = "#FFFFFF";

          if (side === 0) {
            const x = Math.random() * Math.max(1, canvas.width - span);
            ctx.moveTo(x, 0);
            ctx.lineTo(x + span, 0);
            ctx.lineTo(x + span * (0.2 + Math.random() * 0.6), depth);
          } else if (side === 1) {
            const x = Math.random() * Math.max(1, canvas.width - span);
            ctx.moveTo(x, canvas.height);
            ctx.lineTo(x + span, canvas.height);
            ctx.lineTo(
              x + span * (0.2 + Math.random() * 0.6),
              canvas.height - depth,
            );
          } else if (side === 2) {
            const y = Math.random() * Math.max(1, canvas.height - span);
            ctx.moveTo(0, y);
            ctx.lineTo(0, y + span);
            ctx.lineTo(depth, y + span * (0.2 + Math.random() * 0.6));
          } else {
            const y = Math.random() * Math.max(1, canvas.height - span);
            ctx.moveTo(canvas.width, y);
            ctx.lineTo(canvas.width, y + span);
            ctx.lineTo(
              canvas.width - depth,
              y + span * (0.2 + Math.random() * 0.6),
            );
          }

          ctx.closePath();
          ctx.fill();
        }

        const straightTears = Math.floor(wearFactor * 8);
        for (let i = 0; i < straightTears; i += 1) {
          const horizontal = Math.random() < 0.5;
          const thickness = 1 + Math.random() * (1 + wearFactor * 1.2);
          ctx.fillStyle = "rgba(255,255,255,0.92)";

          if (horizontal) {
            const y = Math.random() * canvas.height;
            const length = 16 + Math.random() * (canvas.width * 0.34);
            const x = Math.random() * Math.max(1, canvas.width - length);
            ctx.fillRect(x, y, length, thickness);
          } else {
            const x = Math.random() * canvas.width;
            const length = 16 + Math.random() * (canvas.height * 0.55);
            const y = Math.random() * Math.max(1, canvas.height - length);
            ctx.fillRect(x, y, thickness, length);
          }
        }

        const texture = {
          url: canvas.toDataURL("image/png"),
          ratio: canvas.width / canvas.height,
        };

        textureCache.set(cacheKey, texture);
        return texture;
      };

      // -----------------------------
      // RENDER / UPDATE
      // -----------------------------
      const applyTextureToTag = (tagObj) => {
        if (!tagObj || !tagObj.cardEl || !tagObj.data) return;

        const ageBucket = getAgeBucket(tagObj.createdAt);
        if (tagObj.ageBucket === ageBucket) return;

        const texture = makeTagTexture(
          tagObj.data.text || "",
          tagObj.data.color || "#FFFFFF",
          tagObj.data.bgColor || "#000000",
          ageBucket,
        );

        if (!texture) return;

        const cardWidth = CARD_HEIGHT * texture.ratio;
        tagObj.cardEl.setAttribute("width", `${cardWidth}`);
        tagObj.cardEl.setAttribute("height", `${CARD_HEIGHT}`);
        tagObj.cardEl.setAttribute("src", texture.url);
        tagObj.cardEl.setAttribute(
          "material",
          "shader: flat; side: front; transparent: false; opacity: 1;",
        );

        tagObj.ageBucket = ageBucket;
      };

      const updateAllTagAges = () => {
        for (const [, tagObj] of renderedTags) {
          if (isExpired(tagObj.createdAt)) continue;
          applyTextureToTag(tagObj);
        }
      };

      const removeRenderedTag = (key) => {
        const tag = renderedTags.get(key);
        if (!tag) return;
        tag.entity.remove();
        renderedTags.delete(key);
      };

      const cleanupExpiredTags = async () => {
        const tasks = [];

        for (const [key, tagObj] of renderedTags) {
          if (isExpired(tagObj.createdAt)) {
            tasks.push(
              remove(ref(db, `ar_tags/${key}`)).catch((err) => {
                console.warn("Failed to remove expired tag:", key, err);
              }),
            );
          }
        }

        if (tasks.length) {
          await Promise.all(tasks);
        }
      };

      const createTagElement = (snapshotKey, data) => {
        const textColor = data?.color || "#FFFFFF";
        const bgColor =
          data?.bgColor || (textColor === "#FFFFFF" ? "#000000" : "#FFFFFF");
        const pos = data?.pos || { x: 0, y: 0, z: 0.01 };
        const scale = typeof data?.scale === "number" ? data.scale : 1;
        const rot = data?.rot || { x: 0, y: 0, z: 0 };
        const createdAt =
          typeof data?.createdAt === "number" ? data.createdAt : Date.now();

        if (isExpired(createdAt)) {
          remove(ref(db, `ar_tags/${snapshotKey}`)).catch((err) => {
            console.warn("Failed to remove already expired tag:", err);
          });
          return;
        }

        const texture = makeTagTexture(
          data?.text || "",
          textColor,
          bgColor,
          getAgeBucket(createdAt),
        );

        const tagEl = document.createElement("a-entity");
        tagEl.setAttribute("position", `${pos.x} ${pos.y} ${pos.z}`);

        const finalScale = scale * GLOBAL_TAG_SCALE;
        tagEl.setAttribute(
          "scale",
          `${finalScale} ${finalScale} ${finalScale}`,
        );
        tagEl.setAttribute("rotation", `${rot.x} ${rot.y} ${rot.z}`);

        const cardEl = document.createElement("a-plane");
        const cardWidth = texture ? CARD_HEIGHT * texture.ratio : 0.28;
        cardEl.setAttribute("width", `${cardWidth}`);
        cardEl.setAttribute("height", `${CARD_HEIGHT}`);
        if (texture) cardEl.setAttribute("src", texture.url);

        // front only = sticker/card facing one direction only
        cardEl.setAttribute(
          "material",
          "shader: flat; side: front; transparent: false; opacity: 1;",
        );

        tagEl.appendChild(cardEl);
        anchor.appendChild(tagEl);

        renderedTags.set(snapshotKey, {
          entity: tagEl,
          cardEl,
          data: { ...data, color: textColor, bgColor },
          createdAt,
          ageBucket: -1,
        });

        applyTextureToTag(renderedTags.get(snapshotKey));
      };

      // -----------------------------
      // INPUT / SUBMIT
      // -----------------------------
      const sendTag = async () => {
        const val = input.value.trim().toUpperCase();
        if (!val || isSending) return;

        isSending = true;
        submitBtn.disabled = true;

        const { textColor, bgColor } = getRandomColorPair();

        try {
          await push(dbRef, {
            text: val,
            color: textColor,
            bgColor,
            createdAt: Date.now(),
            pos: {
              x: (Math.random() - 0.5) * 0.4,
              y: (Math.random() - 0.5) * 0.4,
              z: 0.006 + Math.random() * 0.02,
            },
            scale:
              MIN_TAG_SCALE + Math.random() * (MAX_TAG_SCALE - MIN_TAG_SCALE),
            rot: {
              x: (Math.random() - 0.5) * 20,
              y: (Math.random() - 0.5) * 20,
              z: (Math.random() - 0.5) * 40,
            },
          });

          input.value = "";
        } catch (err) {
          console.error("Failed to send tag:", err);
        } finally {
          isSending = false;
          submitBtn.disabled = false;
        }
      };

      submitBtn.addEventListener("click", sendTag);

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          sendTag();
        }
      });

      // Additional mobile focus protection
      input.addEventListener("focus", () => {
        window.scrollTo(0, 0);
      });

      // -----------------------------
      // FIREBASE LIVE EVENTS
      // -----------------------------
      const init = async () => {
        await fontReady();

        onChildAdded(tagsQuery, (snapshot) => {
          if (renderedTags.has(snapshot.key)) return;
          createTagElement(snapshot.key, snapshot.val());
        });

        onChildRemoved(tagsQuery, (snapshot) => {
          removeRenderedTag(snapshot.key);
        });

        updateAllTagAges();
        cleanupExpiredTags();

        // Update age stage every minute so tags move through the 6 monthly stages
        setInterval(() => {
          updateAllTagAges();
        }, 60 * 1000);

        // Clean expired items from DB every hour
        setInterval(
          () => {
            cleanupExpiredTags();
          },
          60 * 60 * 1000,
        );
      };

      init();
    </script>
  </body>
</html>
